<!DOCTYPE html>
<html>
<head>
  <title>R3 Bank | Transfer Money</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">R3 Bank</div>
  <div>
    <a href="home.html">Home</a>
  </div>
</div>

<div class="container">
  <h2>Transfer Money</h2>

  <form action="Transfer" method="post">
    <label>Sender Account No.</label>
    <input type="text" name="saccno" placeholder="Your Account Number" required>
    
    <label>Receiver Account No.</label>
    <input type="text" name="raccno" placeholder="Receiver's Account Number" required>
    
    <label>Amount </label>
    <input type="number" name="tamount" placeholder="Enter Amount" required>
    
    <button type="submit">Transfer Now</button>
  </form>
</div>

</body>
</html>
