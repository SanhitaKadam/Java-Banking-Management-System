<!DOCTYPE html>
<html>
<head>
  <title>Create Account</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">MyBank</div>
  <div>
    <a href="home.html">Home</a>
  </div>
</div>

<div class="container">
  <h2>Open New Bank Account</h2>

  <form action="Accountc" method="post">
    <input type="text" name="aname" placeholder="Full Name" required>
    <input type="text" name="amobile" placeholder="Mobile Number" required>
    <input type="text" name="acity" placeholder="City" required>
    <input type="number" name="abal" placeholder="Initial Balance" required>
    
    <input type="email" name="email" placeholder="Email Address" required>
    <input type="password" name="password" placeholder="Set Password" required>
    
    <button type="submit">Create Account</button>
  </form>
</div>

</body>
</html>
